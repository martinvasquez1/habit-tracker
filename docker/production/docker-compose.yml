services:
  web:
    container_name: web
    image: ghcr.io/martinvasquez1/ant-web:${VERSION:-latest}
    restart: always
    ports:
      - 2001:3000
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - app_network

  api:
    container_name: api
    image: ghcr.io/martinvasquez1/ant-api:${VERSION:-latest}
    restart: always
    ports:
      - 2002:3001
    env_file:
      - .env
    depends_on:
      - db
    command: sh -c 'cd apps/api && npx typeorm -d ./src/database/data-source.ts migration:run && node dist/main.js'
    networks:
      - app_network

  db:
    image: postgres:16
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ant-db
    volumes:
      - ant-prod-pgdata:/var/lib/postgresql/data
    networks:
      - app_network

volumes:
  ant-prod-pgdata:

networks:
  app_network:
    driver: bridge