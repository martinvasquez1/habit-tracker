name: Publish GHCR Images

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Web Image
        run: |
          docker build \
            -f apps/web/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/ant-web:${{ github.ref_name }} \
            -t ghcr.io/${{ github.repository_owner }}/ant-web:latest \
            .

      - name: Push Web Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/ant-web:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository_owner }}/ant-web:latest

      - name: Build API Image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/ant-api:${{ github.ref_name }} \
            -t ghcr.io/${{ github.repository_owner }}/ant-api:latest \
            .

      - name: Push API Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/ant-api:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository_owner }}/ant-api:latest