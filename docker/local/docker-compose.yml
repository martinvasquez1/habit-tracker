services:
  web:
    image: ant-dev-web
    build:
      context: ../..
      dockerfile: ./apps/web/Dockerfile
    restart: always
    ports:
      - 3000:3000
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - app_network

  api:
    image: ant-dev-api
    build:
      context: ../..
      dockerfile: ./apps/api/Dockerfile
    restart: always
    ports:
      - 3001:3001
    env_file:
      - .env
    depends_on:
      - db
    command: sh -c 'cd apps/api && npx typeorm -d ./src/database/data-source.ts migration:run && node dist/main.js'
    networks:
      - app_network

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ant-db
    volumes:
      - ant-local-pgdata:/var/lib/postgresql/data
    networks:
      - app_network

volumes:
  ant-local-pgdata:

networks:
  app_network:
    driver: bridge